<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OPX Auth Test</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  body { background:#0a0a0f; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; gap:16px; }
  #status { background:#16161f; padding:20px; border-radius:12px; max-width:500px; width:90%; line-height:1.8; font-size:14px; }
  button { padding:14px 28px; background:#fff; color:#111; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
  button:hover { background:#eee; }
  .ok { color:#34d399; } .err { color:#f87171; } .info { color:#9090b0; }
</style>
</head>
<body>
<div id="status"><span class="info">Loading SDK...</span></div>
<button onclick="doLogin()">Continue with Google</button>
<button onclick="doLogout()" style="background:#f87171;color:#fff;">Sign Out</button>

<script>
var log = function(msg, type) {
  var el = document.getElementById('status');
  el.innerHTML += '<div class="'+(type||'info')+'">'+msg+'</div>';
  console.log('[TEST]', msg);
};

// Check SDK loaded
if (window.supabase && window.supabase.createClient) {
  log('✅ Supabase SDK loaded', 'ok');
} else {
  log('❌ Supabase SDK FAILED to load — check network', 'err');
}

var SUPABASE_URL  = 'https://czjytskydvfxbtablzss.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6anl0c2t5ZHZmeGJ0YWJsenNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTUwNDIsImV4cCI6MjA5NDY5MTA0Mn0.lYvitM5alNp-tHqptgkbR1yx5Y9M7HDq8D0NSnpE9vM';

var sb;
try {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  log('✅ Supabase client created', 'ok');
} catch(e) {
  log('❌ createClient failed: ' + e.message, 'err');
}

// Check current session
if (sb) {
  sb.auth.getSession().then(function(res) {
    var session = res.data && res.data.session;
    if (session) {
      log('✅ Already logged in as: ' + session.user.email, 'ok');
    } else {
      log('ℹ No active session — click button to login', 'info');
    }
  }).catch(function(e) {
    log('❌ getSession error: ' + e.message, 'err');
  });

  sb.auth.onAuthStateChange(function(event, session) {
    log('Auth event: ' + event + (session ? ' — ' + session.user.email : ''), 'ok');
  });
}

function doLogin() {
  if (!sb) { log('❌ No Supabase client!', 'err'); return; }
  log('Calling signInWithOAuth...', 'info');
  sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://opxlifeos.netlify.app/test.html',
      queryParams: { access_type: 'offline', prompt: 'select_account' }
    }
  }).then(function(res) {
    log('signInWithOAuth response: ' + JSON.stringify(res.data) + ' | error: ' + (res.error ? res.error.message : 'none'), res.error ? 'err' : 'ok');
  }).catch(function(e) {
    log('❌ signInWithOAuth threw: ' + e.message, 'err');
  });
}

function doLogout() {
  if (!sb) return;
  sb.auth.signOut().then(function() { log('Signed out', 'info'); });
}
</script>
</body>
</html>
